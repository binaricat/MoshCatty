name: release

# Build multi-platform mosh-client archives and publish a GitHub Release.
# Tags: moshcatty-0.1.0  (consumed by Netcatty fetch-mosh-binaries)
#
# Manual: workflow_dispatch with version
# Auto:   push of tags matching moshcatty-*

on:
  push:
    tags:
      - "moshcatty-*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without prefix (e.g. 0.1.0 → tag moshcatty-0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: Package
        run: |
          set -euo pipefail
          mkdir -p out/stage
          cp target/release/mosh-client out/stage/mosh-client
          chmod +x out/stage/mosh-client
          tar -C out/stage -czf out/mosh-client-linux-x64.tar.gz mosh-client
          (cd out && sha256sum mosh-client-linux-x64.tar.gz > mosh-client-linux-x64.tar.gz.sha256)
      - uses: actions/upload-artifact@v4
        with:
          name: mosh-client-linux-x64
          path: out/

  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - name: Package
        run: |
          set -euo pipefail
          mkdir -p out/stage
          cp target/release/mosh-client out/stage/mosh-client
          chmod +x out/stage/mosh-client
          tar -C out/stage -czf out/mosh-client-linux-arm64.tar.gz mosh-client
          (cd out && sha256sum mosh-client-linux-arm64.tar.gz > mosh-client-linux-arm64.tar.gz.sha256)
      - uses: actions/upload-artifact@v4
        with:
          name: mosh-client-linux-arm64
          path: out/

  build-darwin-universal:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - name: Build arm64 + x86_64 and lipo
        run: |
          set -euo pipefail
          cargo build --release --target aarch64-apple-darwin
          cargo build --release --target x86_64-apple-darwin
          mkdir -p out/stage
          lipo -create \
            -output out/stage/mosh-client \
            target/aarch64-apple-darwin/release/mosh-client \
            target/x86_64-apple-darwin/release/mosh-client
          chmod +x out/stage/mosh-client
          file out/stage/mosh-client
          tar -C out/stage -czf out/mosh-client-darwin-universal.tar.gz mosh-client
          (cd out && shasum -a 256 mosh-client-darwin-universal.tar.gz > mosh-client-darwin-universal.tar.gz.sha256)
      - uses: actions/upload-artifact@v4
        with:
          name: mosh-client-darwin-universal
          path: out/

  build-win32-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # .cargo/config.toml sets +crt-static for *-windows-msvc so the PE does not
      # import VCRUNTIME140 / UCRT API-sets (see README "Windows CRT").
      - run: cargo build --release
      - name: Assert no VC++ redistributable DLL imports
        shell: pwsh
        run: |
          $exe = "target/release/mosh-client.exe"
          $dump = & "${env:VCToolsInstallDir}bin\Hostx64\x64\dumpbin.exe" /dependents $exe 2>$null
          if (-not $dump) {
            # Fallback: scan PE import strings (no VS path needed)
            $bytes = [IO.File]::ReadAllBytes((Resolve-Path $exe))
            $text = [Text.Encoding]::ASCII.GetString($bytes)
            $dlls = [regex]::Matches($text, '[A-Za-z0-9_\-\.]+\.dll') |
              ForEach-Object { $_.Value.ToLowerInvariant() } | Sort-Object -Unique
          } else {
            $dlls = $dump | Select-String -Pattern '\.dll' | ForEach-Object {
              ($_.Line -replace '^\s+', '').ToLowerInvariant()
            }
          }
          Write-Host "Imports:"; $dlls | ForEach-Object { Write-Host "  $_" }
          $forbidden = @('vcruntime140.dll', 'vcruntime140_1.dll', 'msvcp140.dll', 'ucrtbase.dll') +
            ($dlls | Where-Object { $_ -like 'api-ms-win-crt-*.dll' })
          $hits = $dlls | Where-Object { $forbidden -contains $_ }
          if ($hits) {
            throw "Windows build still imports redistributable CRT DLLs: $($hits -join ', '). Expected +crt-static."
          }
          Write-Host "OK: no VCRUNTIME/UCRT redistributable imports"
      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out/stage
          cp target/release/mosh-client.exe out/stage/mosh-client.exe
          tar -C out/stage -czf out/mosh-client-win32-x64.tar.gz mosh-client.exe
          (cd out && sha256sum mosh-client-win32-x64.tar.gz > mosh-client-win32-x64.tar.gz.sha256)
      - uses: actions/upload-artifact@v4
        with:
          name: mosh-client-win32-x64
          path: out/

  publish:
    name: publish-release
    needs: [build-linux-x64, build-linux-arm64, build-darwin-universal, build-win32-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Assemble release assets
        run: |
          set -euo pipefail
          mkdir -p dist
          for d in artifacts/*/; do
            cp -v "$d"*.tar.gz dist/ 2>/dev/null || true
          done
          ls -la dist
          cd dist
          {
            for f in mosh-client-linux-x64.tar.gz \
                     mosh-client-linux-arm64.tar.gz \
                     mosh-client-darwin-universal.tar.gz \
                     mosh-client-win32-x64.tar.gz; do
              if [ -f "$f" ]; then
                sha256sum "$f"
              fi
            done
          } > SHA256SUMS
          cat SHA256SUMS
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=moshcatty-${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/mosh-client-linux-x64.tar.gz
            dist/mosh-client-linux-arm64.tar.gz
            dist/mosh-client-darwin-universal.tar.gz
            dist/mosh-client-win32-x64.tar.gz
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
