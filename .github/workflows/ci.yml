name: ci

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo test
        run: cargo test --all-targets
      - name: cargo build --release
        run: cargo build --release
      - name: Windows — ConPTY shortcut input
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build --features conpty-test-probe
          npm install --no-save --package-lock=false node-pty@1.1.0
          node tests/windows-conpty-input.cjs
      - name: Windows — no VC++ redistributable imports
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = (Resolve-Path "target/release/mosh-client.exe").Path
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $dumpbin = $null
          if (Test-Path $vswhere) {
            $dumpbin = & $vswhere -latest -products * -find "**/Hostx64/x64/dumpbin.exe" |
              Select-Object -First 1
          }
          if (-not $dumpbin) { throw "dumpbin.exe not found via vswhere" }
          Write-Host "Using dumpbin: $dumpbin"
          $dump = & $dumpbin /dependents $exe
          $dlls = @($dump | ForEach-Object {
            if ($_ -match '^\s+([A-Za-z0-9_\-\.]+\.dll)\s*$') { $Matches[1].ToLowerInvariant() }
          } | Sort-Object -Unique)
          Write-Host "Imports:"; $dlls | ForEach-Object { Write-Host "  $_" }
          $hits = $dlls | Where-Object {
            $_ -in @('vcruntime140.dll','vcruntime140_1.dll','msvcp140.dll','ucrtbase.dll') -or
            $_ -like 'api-ms-win-crt-*.dll'
          }
          if ($hits) { throw "Still depends on CRT redistributable: $($hits -join ', ')" }
          Write-Host "OK: static CRT (no VCRUNTIME/UCRT redist imports)"

  lint:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check
